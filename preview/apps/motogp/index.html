<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1920, height=1080, initial-scale=1">
  <title>MotoGP Fantasy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #1a0000;
      font-family: "LG Smart UI", "Segoe UI", system-ui, sans-serif;
      color: #fff;
    }
    .stage {
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background:
        radial-gradient(900px 600px at 50% 35%, #4a0010 0%, transparent 60%),
        linear-gradient(135deg, #1a0000 0%, #2a0008 100%);
      gap: 40px;
    }
    .logo {
      font-size: 96px; font-weight: 800; letter-spacing: 2px;
      color: #fff;
    }
    .logo span { color: #e4002b; }
    .sub { font-size: 30px; color: #b98; }
    .spinner {
      width: 64px; height: 64px;
      border: 6px solid rgba(255,255,255,0.15);
      border-top-color: #e4002b;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err {
      display: none; margin-top: 20px; font-size: 26px; color: #ffb3b3;
      text-align: center; max-width: 70vw; line-height: 1.4;
    }
    .err a { color: #fff; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="logo">Moto<span>GP</span> Fantasy</div>
    <div class="spinner"></div>
    <div class="sub">Cargando la liga…</div>
    <div class="err" id="err">
      No se pudo abrir automáticamente.<br>
      Ve a <strong>motogp-fantasy-league.web.app</strong> en el navegador de la TV.
    </div>
  </div>

  <script>
    var URL = "https://motogp-fantasy-league.web.app/";
    // Redirige a la PWA (corre nativa, con su propio service worker y login)
    try {
      window.location.replace(URL);
    } catch (e) {
      window.location.href = URL;
    }
    // Si en 5s seguimos aquí, mostrar mensaje de ayuda
    setTimeout(function () {
      document.getElementById("err").style.display = "block";
    }, 5000);
  </script>
</body>
</html>
