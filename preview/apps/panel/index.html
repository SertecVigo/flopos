<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1920,height=1080">
<title>Panel Familiar</title>
<style>
/* Compatible con Chrome 38 (webOS antiguo): sin grid, sin var(), sin aspect-ratio.
   Layout con flexbox + tabla; colores literales. */
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0b1020;color:#e8ebff;
  font-family:"LG Smart UI","Segoe UI",Arial,sans-serif}
#scaler{position:absolute;top:0;left:0;-webkit-transform-origin:top left;transform-origin:top left}
#app{width:1920px;height:1080px;padding:44px;display:-webkit-box;display:flex;
  -webkit-box-orient:vertical;-webkit-flex-direction:column;flex-direction:column}
#app.night{-webkit-filter:brightness(.55);filter:brightness(.55)}

/* Tiempo */
#weather{height:340px;background:#162043;border:1px solid #26304f;border-radius:24px;padding:24px 32px}
.whead{display:-webkit-box;display:flex;-webkit-box-pack:justify;-webkit-justify-content:space-between;
  justify-content:space-between;-webkit-box-align:center;-webkit-align-items:center;align-items:center;margin-bottom:14px}
.whead h2{font-size:30px;color:#8b93c2;font-weight:600}
.brand{font-size:26px;font-weight:800;letter-spacing:3px;color:#7c5cff}
.brand b{color:#e8ebff;font-weight:800}
.wdays{display:-webkit-box;display:flex;height:220px}
.wday{-webkit-box-flex:1;-webkit-flex:1;flex:1;background:#0c1330;border:1px solid #26304f;border-radius:18px;
  margin-right:18px;text-align:center;padding-top:14px}
.wday:last-child{margin-right:0}
.wday .dow{font-size:30px;color:#8b93c2}
.wday .ic{margin:6px 0}
.wday .ic svg{display:block;margin:0 auto}
.wday .temp{font-size:42px;font-weight:700;margin-top:6px}
.wday .temp .min{color:#8b93c2;font-weight:400}
.wday .rain{font-size:24px;color:#4ea3ff;margin-top:10px}

/* Fila inferior */
#bottom{-webkit-box-flex:1;-webkit-flex:1;flex:1;display:-webkit-box;display:flex;margin-top:26px}
#calendar{-webkit-box-flex:1;-webkit-flex:1;flex:1;background:#141a33;border:1px solid #26304f;
  border-radius:24px;padding:24px;margin-right:26px}
#side{width:560px;background:#141a33;border:1px solid #26304f;border-radius:24px;padding:26px}

/* Calendario en TABLA */
.cal-head{display:-webkit-box;display:flex;-webkit-box-pack:justify;-webkit-justify-content:space-between;
  justify-content:space-between;-webkit-box-align:center;-webkit-align-items:center;align-items:center;margin-bottom:14px}
.cal-head h2{font-size:32px}
.cal-head button{font-size:28px;background:#20253f;color:#e8ebff;border:1px solid #26304f;border-radius:8px;width:46px;height:46px}
table.cal{width:100%;border-collapse:collapse;table-layout:fixed}
table.cal th{font-size:22px;color:#8b93c2;padding:6px 0;font-weight:600}
table.cal td{height:66px;text-align:center;font-size:30px;position:relative;border:2px solid transparent;border-radius:10px}
td.dim{color:#3a4570}
td.today{background:#1c2550}
td.sel{border-color:#7c5cff;background:#241d4d}
td .dot{position:absolute;left:50%;bottom:7px;width:9px;height:9px;margin-left:-4px;background:#7c5cff;border-radius:50%}

/* Columna lateral */
.clock .time{font-size:92px;font-weight:800;line-height:1}
.clock .date{font-size:32px;color:#8b93c2;margin-top:4px}
.card{margin-top:26px}
.card h3{font-size:26px;color:#8b93c2;margin-bottom:8px}
.raceItem{margin-bottom:16px}
.rname{font-size:27px;font-weight:700}
.rname .lg{font-size:22px;color:#8b93c2;font-weight:400}
.rcd{font-size:25px;color:#7c5cff}
.rsess{font-size:23px;color:#cfd6ff;margin-top:5px}
.rsess b{color:#7c5cff;font-weight:700}
.rsess .cd{color:#8b93c2}
.shop p{font-size:30px;line-height:1.55}
.shop .it{color:#e8ebff}.shop .b{color:#7c5cff}

#offline{position:absolute;bottom:16px;right:18px;font-size:20px;color:#ff8a8a;display:none}

/* Modal del día */
#modal{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(5,7,16,.8);display:none}
#modal.show{display:block}
#modalBox{position:absolute;top:50%;left:50%;width:820px;margin-left:-410px;margin-top:-230px;
  background:#141a33;border:1px solid #26304f;border-radius:24px;padding:30px}
#modalBox h2{font-size:38px;margin-bottom:14px}
.evt{display:-webkit-box;display:flex;-webkit-box-pack:justify;-webkit-justify-content:space-between;
  justify-content:space-between;font-size:28px;padding:12px 4px;border-bottom:1px solid #26304f}
.evt button{background:transparent;border:0;color:#ff8a8a;font-size:26px}
.frm{margin-top:18px}
.frm select,.frm input{font-size:26px;padding:10px;border-radius:8px;border:1px solid #26304f;background:#0c1330;color:#e8ebff;margin-right:8px}
.frm input.t{width:520px}
.frm button{font-size:26px;padding:10px 16px;border-radius:8px;border:0;background:#7c5cff;color:#fff}
.hint{margin-top:14px;font-size:22px;color:#8b93c2}
</style>
</head>
<body>
<div id="scaler"><div id="app">
  <div id="weather">
    <div class="whead"><h2>Tiempo en <span id="wcity">Vigo</span></h2><div class="brand">Flop<b>OS</b></div></div>
    <div class="wdays" id="wdays"></div>
  </div>
  <div id="bottom">
    <div id="calendar">
      <div class="cal-head"><button id="prev">&#8249;</button><h2 id="calTitle">&mdash;</h2><button id="next">&#8250;</button></div>
      <table class="cal"><thead><tr><th>L</th><th>M</th><th>X</th><th>J</th><th>V</th><th>S</th><th>D</th></tr></thead>
        <tbody id="calBody"></tbody></table>
    </div>
    <div id="side">
      <div class="clock"><div class="time" id="clock">--:--</div><div class="date" id="cdate">&mdash;</div></div>
      <div class="card"><h3>Pr&oacute;ximas carreras</h3><div id="raceList"></div></div>
      <div class="card shop"><h3>Lista de la compra</h3><div id="shopList"></div></div>
    </div>
  </div>
</div></div>
<div id="offline">sin conexion</div>
<div id="modal"><div id="modalBox"></div></div>

<script>
/* ===== Panel Familiar - versión ES5 compatible Chrome 38 (webOS antiguo) ===== */
var CFG = {
  READ_URL: "https://n8n.edmdesign.eu/webhook/panel-familiar",
  WRITE_URL: "https://n8n.edmdesign.eu/webhook/panel-evento",
  TOKEN: "pf_live_OjefI3uGl3dNAzzDJ4siW0O3YWLZVxWL",
  REFRESH_MS: 300000
};
var COND = { sun:"Despejado", partly:"Poco nuboso", cloud:"Nublado", rain:"Lluvia",
  storm:"Tormenta", snow:"Nieve", fog:"Niebla" };
var DATA = { weather:{city:"Vigo",days:[]}, races:[], shopping:[], calendar:{events:[]} };
var viewMonth = new Date(); viewMonth.setDate(1);
var selDay = null;

function $(id){ return document.getElementById(id); }
function pad(n){ return (n<10?"0":"")+n; }
function ymd(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function esc(s){ s=""+s; return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* Iconos del tiempo en SVG (compatibles con Chrome 38, con color) */
function iconSVG(name){
  var V='<svg width="82" height="82" viewBox="0 0 64 64">';
  var sun='<circle cx="32" cy="29" r="12" fill="#ffd34d"/>'
    +'<g stroke="#ffd34d" stroke-width="4" stroke-linecap="round">'
    +'<line x1="32" y1="6" x2="32" y2="12"/><line x1="32" y1="46" x2="32" y2="52"/>'
    +'<line x1="9" y1="29" x2="15" y2="29"/><line x1="49" y1="29" x2="55" y2="29"/>'
    +'<line x1="15" y1="12" x2="19" y2="16"/><line x1="45" y1="42" x2="49" y2="46"/>'
    +'<line x1="15" y1="46" x2="19" y2="42"/><line x1="45" y1="16" x2="49" y2="12"/></g>';
  var cloud='<g fill="#c2cbe8"><circle cx="23" cy="40" r="11"/><circle cx="37" cy="34" r="14"/>'
    +'<circle cx="47" cy="41" r="10"/><rect x="19" y="41" width="32" height="12" rx="6"/></g>';
  if(name==="sun") return V+sun+'</svg>';
  if(name==="cloud") return V+cloud+'</svg>';
  if(name==="partly") return V+'<g transform="translate(16,-4) scale(0.62)">'+sun+'</g>'+cloud+'</svg>';
  if(name==="fog") return V+cloud+'<g stroke="#9aa3c8" stroke-width="3" stroke-linecap="round">'
    +'<line x1="16" y1="57" x2="40" y2="57"/><line x1="26" y1="62" x2="50" y2="62"/></g></svg>';
  if(name==="rain") return V+cloud+'<g stroke="#4ea3ff" stroke-width="4" stroke-linecap="round">'
    +'<line x1="24" y1="55" x2="21" y2="62"/><line x1="34" y1="55" x2="31" y2="62"/><line x1="44" y1="55" x2="41" y2="62"/></g></svg>';
  if(name==="storm") return V+cloud+'<polygon points="35,49 28,59 33,59 31,64 43,54 37,54 40,49" fill="#ffd34d"/></svg>';
  if(name==="snow") return V+cloud+'<g fill="#e3eaff"><circle cx="25" cy="58" r="3"/><circle cx="35" cy="61" r="3"/><circle cx="45" cy="58" r="3"/></g></svg>';
  return V+cloud+'</svg>';
}

function xhr(method, url, body, cb){
  try{
    var x = new XMLHttpRequest();
    x.open(method, url, true);
    if(method==="POST") x.setRequestHeader("Content-Type","text/plain");
    x.onreadystatechange = function(){
      if(x.readyState===4){
        if(x.status>=200 && x.status<300){ var j=null; try{ j=JSON.parse(x.responseText); }catch(e){} cb(null,j); }
        else cb(new Error("HTTP "+x.status));
      }
    };
    x.send(body||null);
  }catch(e){ cb(e); }
}

function fitScale(){
  var sc=$("scaler"); if(!sc) return;
  var s=Math.min(window.innerWidth/1920, window.innerHeight/1080);
  sc.style.webkitTransform="scale("+s+")"; sc.style.transform="scale("+s+")";
  sc.style.left=((window.innerWidth-1920*s)/2)+"px";
  sc.style.top=((window.innerHeight-1080*s)/2)+"px";
}

function renderWeather(){
  var days=(DATA.weather&&DATA.weather.days)||[], html="", i, d;
  for(i=0;i<days.length;i++){ d=days[i];
    html+='<div class="wday"><div class="dow">'+esc(d.dow)+'</div>'
      +'<div class="ic">'+iconSVG(d.icon)+'</div>'
      +'<div class="temp">'+d.max+'&deg;<span class="min"> / '+d.min+'&deg;</span></div>'
      +'<div class="rain">Lluvia '+(d.rainProb||0)+'%</div></div>';
  }
  $("wdays").innerHTML=html;
  $("wcity").innerHTML=esc((DATA.weather&&DATA.weather.city)||"Vigo");
}

function renderRaces(){
  var rs=DATA.races&&DATA.races.length?DATA.races:[];
  var now=new Date(), html="", i, j, r, sess, s, diff, dd, hh, cd, lg;
  if(!rs.length){ $("raceList").innerHTML='<div class="rcd">&mdash;</div>'; return; }
  for(i=0;i<rs.length;i++){ r=rs[i];
    lg=r.league?(' <span class="lg">liga '+r.league.pos+'&ordm; ('+r.league.pts+'pts)</span>'):"";
    html+='<div class="raceItem"><div class="rname">'+esc(r.series)+' &middot; '+esc(r.name)+lg+'</div>';
    sess=r.sessions||[];
    for(j=0;j<sess.length;j++){ s=sess[j];
      diff=new Date(s.startUtc).getTime()-now.getTime();
      dd=Math.max(0,Math.floor(diff/86400000)); hh=Math.max(0,Math.floor((diff%86400000)/3600000));
      cd=diff>0?("faltan "+dd+"d "+hh+"h"):"en curso";
      html+='<div class="rsess"><b>'+esc(s.typeLabel||s.type)+'</b> '+esc(s.label)+' <span class="cd">('+cd+')</span></div>';
    }
    html+='</div>';
  }
  $("raceList").innerHTML=html;
}

function renderShop(){
  var sh=DATA.shopping||[], i, html="";
  if(!sh.length){ $("shopList").innerHTML='<p class="it">&mdash;</p>'; return; }
  for(i=0;i<sh.length && i<8;i++){ html+='<p><span class="b">&bull; </span><span class="it">'+esc(sh[i])+'</span></p>'; }
  $("shopList").innerHTML=html;
}

function renderClock(){
  var n=new Date();
  $("clock").innerHTML=pad(n.getHours())+":"+pad(n.getMinutes());
  var dias=["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
  var mes=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  $("cdate").innerHTML=dias[n.getDay()]+" "+n.getDate()+" "+mes[n.getMonth()];
  var h=n.getHours(); var app=$("app");
  if(h>=0&&h<7){ app.className="night"; } else { app.className=""; }
}

function renderCalendar(){
  var y=viewMonth.getFullYear(), m=viewMonth.getMonth();
  var mes=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  $("calTitle").innerHTML=mes[m]+" "+y;
  var events=(DATA.calendar&&DATA.calendar.events)||[];
  var has={}; var i; for(i=0;i<events.length;i++){ has[events[i].date]=1; }
  var first=new Date(y,m,1); var startIdx=(first.getDay()+6)%7;
  var dim=new Date(y,m+1,0).getDate(); var todayStr=ymd(new Date());
  var html="<tr>", col=0, day=1, ds, cls;
  for(i=0;i<startIdx;i++){ html+="<td></td>"; col++; }
  for(day=1;day<=dim;day++){
    if(col===7){ html+="</tr><tr>"; col=0; }
    ds=y+"-"+pad(m+1)+"-"+pad(day);
    cls=""; if(ds===todayStr) cls+="today "; if(ds===selDay) cls+="sel ";
    html+='<td class="'+cls+'">'+day+(has[ds]?'<span class="dot"></span>':'')+'</td>';
    col++;
  }
  while(col<7&&col>0){ html+="<td></td>"; col++; }
  html+="</tr>";
  $("calBody").innerHTML=html;
}

function moveSel(delta){
  var base=selDay?new Date(selDay+"T00:00:00"):new Date();
  base.setDate(base.getDate()+delta);
  if(base.getMonth()!==viewMonth.getMonth()||base.getFullYear()!==viewMonth.getFullYear()){
    viewMonth=new Date(base.getFullYear(),base.getMonth(),1); refresh();
  }
  selDay=ymd(base); renderCalendar();
}

/* ===== Datos ===== */
function refresh(){
  var month=ymd(viewMonth).substring(0,7);
  xhr("GET", CFG.READ_URL+"?token="+encodeURIComponent(CFG.TOKEN)+"&month="+month, null, function(err,j){
    if(err||!j||j.error){ $("offline").style.display="block"; return; }
    DATA=j; $("offline").style.display="none";
    renderWeather(); renderRaces(); renderShop(); renderCalendar();
  });
}

/* ===== Modal del día ===== */
function openDay(date){
  var events=(DATA.calendar&&DATA.calendar.events)||[], evs=[], i;
  for(i=0;i<events.length;i++){ if(events[i].date===date) evs.push(events[i]); }
  evs.sort(function(a,b){ return (a.time||"").localeCompare(b.time||""); });
  var pretty=date, html='<h2>'+pretty+'</h2>';
  if(evs.length){ for(i=0;i<evs.length;i++){
    html+='<div class="evt"><span>'+(evs[i].type==="cita"&&evs[i].time?esc(evs[i].time)+" - ":"")+esc(evs[i].text)+'</span>'
      +'<button data-del="'+esc(evs[i].id)+'">Borrar</button></div>';
  }} else { html+='<div class="hint">Sin notas ni citas</div>'; }
  html+='<div class="frm"><select id="evType"><option value="nota">Nota</option><option value="cita">Cita</option></select>'
    +'<input id="evTime" placeholder="hh:mm" style="width:120px"><input id="evText" class="t" placeholder="Escribe aqui..."> '
    +'<button id="evAdd">Anadir</button></div>'
    +'<div class="hint">Pulsa ATRAS en el mando para cerrar</div>';
  $("modalBox").innerHTML=html;
  $("modal").className="show";
  var txt=$("evText"); if(txt) txt.focus();
  $("evAdd").onclick=function(){
    var t=$("evText").value; if(!t||!t.replace(/^\s+|\s+$/g,"")) return;
    save({action:"add",date:date,type:$("evType").value,time:$("evTime").value||null,
      text:t.replace(/^\s+|\s+$/g,""),createdBy:"tv"}, function(){ openDay(date); });
  };
  var dels=$("modalBox").getElementsByTagName("button"), k;
  for(k=0;k<dels.length;k++){ (function(btn){
    var id=btn.getAttribute("data-del"); if(!id) return;
    btn.onclick=function(){ save({action:"delete",id:id}, function(){ openDay(date); }); };
  })(dels[k]); }
}
function closeDay(){ $("modal").className=""; }
function save(payload, done){
  xhr("POST", CFG.WRITE_URL+"?token="+encodeURIComponent(CFG.TOKEN), JSON.stringify(payload), function(){
    refresh(); if(done) setTimeout(done, 400);
  });
}

/* ===== Teclas del mando ===== */
document.addEventListener("keydown", function(e){
  var k=e.keyCode;
  if($("modal").className==="show"){ if(k===461||k===27){ e.preventDefault(); closeDay(); } return; }
  if(k===37){ e.preventDefault(); moveSel(-1); }
  else if(k===39){ e.preventDefault(); moveSel(1); }
  else if(k===38){ e.preventDefault(); moveSel(-7); }
  else if(k===40){ e.preventDefault(); moveSel(7); }
  else if(k===13){ e.preventDefault(); if(selDay) openDay(selDay); }
});
window.addEventListener("resize", fitScale);

/* ===== Arranque ===== */
function init(){
  fitScale();
  renderClock(); renderCalendar();
  refresh();
  setInterval(renderClock, 1000);
  setInterval(refresh, CFG.REFRESH_MS);
  $("prev").onclick=function(){ viewMonth.setMonth(viewMonth.getMonth()-1); refresh(); renderCalendar(); };
  $("next").onclick=function(){ viewMonth.setMonth(viewMonth.getMonth()+1); refresh(); renderCalendar(); };
}
if(document.readyState==="complete"||document.readyState==="interactive") init();
else document.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
